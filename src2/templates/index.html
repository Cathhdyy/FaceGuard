<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="icon">👁️</div>
                <h1>FaceGuard</h1>
            </div>

            <div class="control-group">
                <h3>Detection Model</h3>
                <div class="model-selector">
                    <button class="model-btn active" data-model="haar" onclick="setModel('haar')">
                        <span class="model-name">Haar</span>
                        <span class="model-desc">Fastest</span>
                    </button>
                    <button class="model-btn" data-model="hog" onclick="setModel('hog')">
                        <span class="model-name">HOG</span>
                        <span class="model-desc">Balanced</span>
                    </button>
                    <button class="model-btn" data-model="cnn" onclick="setModel('cnn')">
                        <span class="model-name">CNN</span>
                        <span class="model-desc">Accurate</span>
                    </button>
                </div>
            </div>

            <div class="control-group">
                <h3>Live Stats</h3>
                <div class="stat-card">
                    <span class="stat-label">Captured Frames</span>
                    <span class="stat-value" id="frame-count">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Faces Detected</span>
                    <span class="stat-value" id="face-count">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Processing FPS</span>
                    <span class="stat-value" id="processing-fps">0.0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Recognized</span>
                    <div class="names-list" id="names-list">
                        <span class="placeholder">Scanning...</span>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Emotion Detected</span>
                    <div class="names-list" id="emotions-list">
                        <span class="placeholder">Analyzing...</span>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <h3>Upload File</h3>
                <div class="upload-section">
                    <input type="file" id="file-input" accept="image/*,video/*" style="display:none">
                    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                        📁 Choose File
                    </button>
                    <div id="upload-status"></div>
                </div>
            </div>
            <div class="control-group">
                <h3>Model Actions</h3>
                <div class="upload-section">
                    <button class="upload-btn" id="manual-retrain" onclick="manualRetrain()" style="background: var(--bg-dark); border: 1px solid var(--accent); color: var(--accent);">
                        🔄 Retrain AI Index
                    </button>
                    <div id="retrain-status" style="font-size: 0.75rem; text-align: center; margin-top: 0.5rem; color: var(--text-secondary);"></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="video-container" id="main-display">
                <div class="live-indicator">
                    <span class="dot"></span> LIVE
                </div>
                <img src="{{ url_for('video_feed') }}" alt="Live Feed" class="video-feed" id="main-video">
            </div>

            <div id="result-view" class="video-container" style="display:none;">
                <button class="back-btn" onclick="backToLive()">← Back to Live</button>
                <img id="result-image" class="video-feed">
            </div>
        </main>
    </div>

    <!-- Registration Modal -->
    <div id="register-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h2>Register New Face</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p>Enter the name for this person to train the AI:</p>
                <input type="text" id="reg-name" placeholder="Full Name" autocomplete="off">
                <input type="hidden" id="reg-index" value="0">
                <div class="modal-actions">
                    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                    <button class="submit-btn" id="confirm-reg" onclick="submitRegistration()">Register & Train</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
